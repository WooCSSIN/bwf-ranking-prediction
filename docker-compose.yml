services:
  # The FastAPI Inference Application
  api:
    build: .
    container_name: bwf_api
    ports:
      - "8000:8000"
    volumes:
      # Mount models and data so we don't need to rebuild the image when updating them
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Local MLflow server for tracking experiments
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: bwf_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

volumes:
  mlflow_data:
